<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotten Witch Hunt</title>
    <link rel="icon" href="ASSETS/IMAGES/pera50.png" type="image/png">
    <link rel="stylesheet" href="https://use.typekit.net/oro0nsk.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            background-image: url("IMG/legno.png");
            font-family: 'ProximaNovaCondensed', sans-serif;
            color: #5e3f2e;
        }

        @font-face {
            font-family: 'ProximaNovaCondensed';
            src: url('IMG/font/Proxima-Nova-Extra-Condensed/Demo_Fonts/Fontspring-DEMO-proximanova-regular.otf');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'ProximaNovaCondensed';
            src: url('IMG/font/Proxima-Nova-Extra-Condensed/Demo_Fonts/Fontspring-DEMO-proximanova-bold.otf');
            font-weight: 700;
            font-style: normal;
        }

        @font-face {
            font-family: 'ProximaNovaCondensed';
            src: url('IMG/font/Proxima-Nova-Extra-Condensed/Demo_Fonts/Fontspring-DEMO-proximanova-black.otf');
            font-weight: 900;
            font-style: normal;
        }

        @font-face {
            font-family: 'ProximaNovaCondensed';
            src: url('IMG/font/Proxima-Nova-Extra-Condensed/Demo_Fonts/Fontspring-DEMO-proximanovacond-mediumit.otf');
            font-weight: 600;
            font-style: italic;
        }

        img {
            position: absolute;
            width: 1280px;
            height: 720px;
        }

        .back-link {
            position: absolute;
            top:87%;
            right: 86%;
            transform: translateX(-50%);
            font-size: 14px;
            text-decoration: none;
            color: #5e3f2e;
            background-image: url('IMG/bottonefreccia.png');
            background-size: cover;
            width: 105px;
            height: 70px;
            transform: scaleX(-1);
            text-indent: -9999px; /* Nasconde il testo */
            border: none; /* Rimuove il bordo */
            background-color: transparent; /* Rimuove il colore di sfondo */
        }

        .back-link:hover {
            opacity: 0.8; /* Effetto hover per una leggera opacità */
        }

        .back-link:active {
            transform: scale(0.95); /* Effetto di clic */
        }
    </style>
</head>
<body>
    <iframe src="music.html" style="display:none;"></iframe>
    <img src="IMG/credits.jpg" alt="Credits">
    <a href="indexwebapp.html" class="back-link"></a>
</body>
</html>
