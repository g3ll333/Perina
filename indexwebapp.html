<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotten Witch Hunt</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        .container {
            position: relative;
            width: 1280px;
            height: 720px;
        }
        img {
            width: 100%;
            height: 100%;
        }
        .link-image {
            position: absolute;
            left: 50%;
            top: 79%;
            transform: translate(-50%, -50%);
            width: 238px;
            height: 58px;
            cursor: pointer;
        }
        .story-image {
            position: absolute;
            left: 50%;
            top: 60%;
            transform: translate(-50%, -50%);
            width: 238px;
            height: 56px;
            cursor: pointer;
        }
        .play-image {
            position: absolute;
            left: 50%;
            top: 69.17%;
            transform: translate(-50%, -50%);
            width: 238px;
            height: 56px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="IMG/copertina.png" alt="Copertina">
        <a href="credits.html">
            <img src="IMG/credits.png" alt="Credits" class="link-image">
        </a>
        <a href="story.html">
            <img src="IMG/story.png" alt="Story" class="story-image">
        </a>
        <a href="index.html">
            <img src="IMG/play.png" alt="Play" class="play-image">
        </a>
    </div>
</body>
</html>
